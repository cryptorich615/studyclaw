version: '3.8'

services:
  # StudyClaw API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENCLAW_URL=${OPENCLAW_URL}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
      - ADMIN_KEY=${ADMIN_KEY}
    depends_on:
      - db
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=studyclaw
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=studyclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # OpenClaw Gateway (no branding exposed)
  # Update image to latest OpenClaw version
  openclaw:
    image: openclaw/gateway:latest
    ports:
      - "8080:8080"
    environment:
      - API_TOKEN=${OPENCLAW_TOKEN}
    volumes:
      - openclaw_data:/data
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  openclaw_data:
  ssl_certs:

# Health checks
健康检查:
  test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
  interval: 30s
  timeout: 10s
  retries: 3
